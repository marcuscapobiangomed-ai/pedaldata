title: Comparador de Bicicletas
permalink: /comparar/

<section class="page-header">
  <div class="container">
    <h1>Comparador de Bicicletas</h1>
    <p class="page-subtitle">Compare até 3 bicicletas lado a lado com dados da base Pedal Data</p>
  </div>
</section>

<section class="comparator-section">
  <div class="container">
    <div class="comparator-controls">
      <div class="comparator-selectors">
        <div class="comparator-slot" data-slot="0">
          <label>Bicicleta 1</label>
          <select class="bike-select" data-slot="0">
            <option value="">Selecione uma bicicleta</option>
          </select>
        </div>
        <div class="comparator-slot" data-slot="1">
          <label>Bicicleta 2</label>
          <select class="bike-select" data-slot="1">
            <option value="">Selecione uma bicicleta</option>
          </select>
        </div>
        <div class="comparator-slot" data-slot="2">
          <label>Bicicleta 3 (opcional)</label>
          <select class="bike-select" data-slot="2">
            <option value="">Selecione uma bicicleta</option>
          </select>
        </div>
      </div>
    </div>

    <div id="comparator-results" class="comparator-results" style="display:none;">
      <table class="comparison-table">
        <thead id="comparison-header">
          <tr>
            <th class="criteria-col">Critério</th>
          </tr>
        </thead>
        <tbody id="comparison-body">
        </tbody>
      </table>
      <div id="comparison-veredict" class="comparison-veredict"></div>
    </div>

    <div id="comparator-empty" class="comparator-empty">
      <p>Selecione pelo menos duas bicicletas para comparar.</p>
    </div>
  </div>
</section>

<script src="{{ site.baseurl }}/assets/js/catalog.js"></script>
<script src="{{ site.baseurl }}/assets/js/comparator.js"></script>
