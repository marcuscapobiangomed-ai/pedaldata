name: Validar Conteúdo (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "_posts/**"
      - "data/**"
      - "content/research/**"
      - "assets/img/posts/**"
      - "_config.yml"
      - "_redirects.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-validate-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Instalar Dependências
        run: npm ci
        working-directory: bot

      - name: Lint (JS)
        run: |
          node --check src/schemas/research.schema.js
          node --check src/schemas/article.schema.js
          node --check src/validation/validate-research.js
          node --check src/validation/validate-images.js
          node --check src/validation/check-claims.js
          node --check src/generator.js
        working-directory: bot

      - name: Validar Fichas de Pesquisa
        run: node src/validation/validate-research.js
        working-directory: bot

      - name: Verificar Alegações Proibidas
        run: node src/validation/check-claims.js
        working-directory: bot

      - name: Validar Imagens
        run: node src/validation/validate-images.js
        working-directory: bot

      - name: Validar Base de Dados (schemas)
        run: node data/schemas/validate-all.js

      - name: Check for fictional authorship
        run: |
          ! grep -r "Sergio Arantes" _posts/ --include="*.md" && echo "OK" || (echo "ERRO: autoria fictícia encontrada"; exit 1)

      - name: Check for missing source sections
        run: |
          for f in _posts/*.md; do
            if ! grep -qi "## Fontes\|## Referências" "$f"; then
              echo "AVISO: $f não tem seção de fontes"
            fi
          done

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production
