name: Validate Images

on:
  pull_request:
    paths:
      - "_posts/**"
      - "assets/img/posts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate post images
        run: node scripts/validate-images.js
