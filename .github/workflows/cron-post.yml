name: Publicação Automática de Posts (Cron)

on:
  # CRON SUSPENSO — reativar apenas após revisão editorial
  # schedule:
  #   - cron: '0 9 * * *'    # 06:00 BRT
  #   - cron: '0 15 * * *'   # 12:00 BRT
  #   - cron: '0 21 * * *'   # 18:00 BRT
  workflow_dispatch:
    inputs:
      topic:
        description: "Tópico específico (deixe vazio para pegar da fila)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pedaldata-auto-publisher
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Instalar Dependências
        run: npm ci
        working-directory: bot

      - name: Gerar Post e Criar PR
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_TOPIC: ${{ inputs.topic || '' }}
        run: node src/cron_post.js
        working-directory: bot

      - name: Validar Build Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production
