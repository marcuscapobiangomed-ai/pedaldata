<script>
(function() {
  var content = document.querySelector('.post-content');
  if (!content) return;

  // Procura por "## Perguntas Frequentes" (h2) ou "**Perguntas Frequentes**" (strong em p)
  var faqHeading = content.querySelector('h2');
  var faqFound = false;
  while (faqHeading) {
    if (faqHeading.textContent.trim().toLowerCase().indexOf('perguntas frequentes') !== -1) {
      faqFound = true;
      break;
    }
    faqHeading = faqHeading.nextElementSibling;
    // Também procura por <strong> dentro de <p> marcações em negrito
    if (!faqHeading || faqHeading.tagName !== 'H2') {
      var allP = content.querySelectorAll('p');
      for (var p = 0; p < allP.length; p++) {
        var strong = allP[p].querySelector('strong');
        if (strong && strong.textContent.trim().toLowerCase().indexOf('perguntas frequentes') !== -1) {
          faqHeading = allP[p];
          faqFound = true;
          break;
        }
      }
      if (faqFound) break;
    }
  }
  if (!faqFound) return;

  var questions = [];
  var el = faqHeading.nextElementSibling;

  // Detecta se o formato é markdown bold (**1. Pergunta?**) ou h3
  var isMarkdownBold = false;
  if (el) {
    var firstStrong = el.querySelector('strong');
    if (firstStrong) isMarkdownBold = true;
  }

  while (el && (!faqHeading.tagName || faqHeading.tagName !== 'H2' || el.tagName !== 'H2')) {
    // Sai se encontrar outro h2 (próxima seção)
    if (el.tagName === 'H2' && el !== faqHeading) break;

    var questionText = null;
    var answerEl = null;

    if (isMarkdownBold) {
      // Formato: <p><strong>1. Pergunta?</strong><br>Resposta</p>
      var strong = el.tagName === 'P' ? el.querySelector('strong') : null;
      if (strong) {
        questionText = strong.textContent.replace(/^\d+[\.\)]\s*/, '').trim();
        // Resposta é o resto do <p> após o <strong>
        var textContent = el.textContent;
        var qFull = strong.textContent;
        var answerText = textContent.substring(textContent.indexOf(qFull) + qFull.length).trim();
        if (answerText) {
          questions.push({ question: questionText, answer: answerText });
        }
      }
    } else {
      // Formato: <h3>Pergunta?</h3>
      if (el.tagName === 'H3') {
        questionText = el.textContent.replace(/^\d+\.\s*/, '').trim();
        var ansEl = el.nextElementSibling;
        var answerText = '';
        while (ansEl && ansEl.tagName !== 'H3' && ansEl.tagName !== 'H2') {
          if (ansEl.tagName === 'P' || ansEl.tagName === 'DIV' || ansEl.tagName === 'UL' || ansEl.tagName === 'OL') {
            answerText += ansEl.textContent.replace(/\s+/g, ' ').trim() + ' ';
          }
          ansEl = ansEl.nextElementSibling;
        }
        if (answerText.trim()) {
          questions.push({ question: questionText, answer: answerText.trim() });
        }
      }
    }

    el = el.nextElementSibling;
  }

  if (questions.length > 0) {
    var script = document.createElement('script');
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": questions.map(function(q) {
        return {
          "@type": "Question",
          "name": q.question,
          "acceptedAnswer": {
            "@type": "Answer",
            "text": q.answer
          }
        };
      })
    });
    document.head.appendChild(script);
  }
})();
</script>
