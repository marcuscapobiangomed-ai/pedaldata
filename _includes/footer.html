<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>{{ site.title }}</h4>
        <p>{{ site.tagline }}</p>
      </div>
      <div class="footer-col">
        <h4>Links</h4>
        <a href="{{ site.baseurl }}/">Início</a>
        <a href="{{ site.baseurl }}/categorias">Categorias</a>
        <a href="{{ site.baseurl }}/sobre">Sobre</a>
      </div>
      <div class="footer-col">
        <h4>Disclaimer</h4>
        <p class="disclaimer">Este site contém links de afiliados. Podemos ganhar comissão sem custo adicional para você.</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }} — Todos os direitos reservados.</p>
    </div>
  </div>
</footer>

<script>
(function() {
  var menuToggle = document.getElementById('menuToggle');
  var menuClose = document.getElementById('menuClose');
  var mobileMenu = document.getElementById('mobileMenu');
  var mobileOverlay = document.getElementById('mobileOverlay');
  var searchToggle = document.getElementById('searchToggle');
  var searchClose = document.getElementById('searchClose');
  var headerSearch = document.getElementById('headerSearch');

  function toggleMenu(open) {
    mobileMenu.classList.toggle('open', open);
    mobileOverlay.classList.toggle('open', open);
    document.body.classList.toggle('menu-open', open);
    menuToggle.classList.toggle('active', open);
  }

  if (menuToggle) menuToggle.addEventListener('click', function() { toggleMenu(true); });
  if (menuClose) menuClose.addEventListener('click', function() { toggleMenu(false); });
  if (mobileOverlay) mobileOverlay.addEventListener('click', function() { toggleMenu(false); });

  if (searchToggle) {
    searchToggle.addEventListener('click', function() {
      var isOpen = headerSearch.classList.toggle('open');
      searchToggle.classList.toggle('active', isOpen);
      if (isOpen) {
        setTimeout(function() {
          headerSearch.querySelector('.search-input').focus();
        }, 200);
      }
    });
  }

  if (searchClose) {
    searchClose.addEventListener('click', function() {
      headerSearch.classList.remove('open');
      searchToggle.classList.remove('active');
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      headerSearch.classList.remove('open');
      searchToggle.classList.remove('active');
      toggleMenu(false);
    }
  });
})();
</script>
