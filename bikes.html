---
layout: default
title: Bicicletas
permalink: /bikes/
---

<section class="page-header">
  <div class="container">
    <h1>Catálogo de Bicicletas</h1>
    <p class="page-subtitle">Fichas técnicas completas com dados verificados de fabricantes e distribuidores</p>
  </div>
</section>

<section class="comparator-section">
  <div class="container">
    <div class="catalog-controls">
      <select id="catalog-filter-brand" class="catalog-filter">
        <option value="">Todas as marcas</option>
        <option value="Caloi">Caloi</option>
        <option value="Cannondale">Cannondale</option>
        <option value="Cervélo">Cervélo</option>
        <option value="Oggi">Oggi</option>
        <option value="Scott">Scott</option>
        <option value="Sense">Sense</option>
        <option value="Specialized">Specialized</option>
        <option value="Trek">Trek</option>
      </select>
      <select id="catalog-filter-category" class="catalog-filter">
        <option value="">Todas as categorias</option>
        <option value="road-entry">Entrada</option>
        <option value="road-endurance">Endurance</option>
        <option value="road-race">Race</option>
        <option value="road-aero">Aero</option>
        <option value="road-climbing">Climber</option>
        <option value="road-allround">All-Round</option>
        <option value="gravel">Gravel</option>
      </select>
      <input type="text" id="catalog-search" placeholder="Buscar modelo ou marca...">
    </div>

    <div id="catalog-grid" class="catalog-grid"></div>

    <div id="catalog-status" class="comparator-empty" style="display:none;">
      <p>Nenhuma bicicleta encontrada com os filtros selecionados.</p>
    </div>
  </div>
</section>

<script src="{{ site.baseurl }}/assets/js/catalog.js"></script>
<script>
;(function() {
  const BASE = window.location.pathname.includes('/pedaldata') ? '/pedaldata' : ''

  document.addEventListener('DOMContentLoaded', async function() {
    const grid = document.getElementById('catalog-grid')
    const statusEl = document.getElementById('catalog-status')
    const brandFilter = document.getElementById('catalog-filter-brand')
    const catFilter = document.getElementById('catalog-filter-category')
    const searchInput = document.getElementById('catalog-search')

    const catalog = await PedalData.utils.loadCatalog()

    function render() {
      const brand = brandFilter.value
      const cat = catFilter.value
      const query = searchInput.value.toLowerCase().trim()

      let filtered = catalog.bikes.filter(b => {
        if (brand && b.brand !== brand) return false
        if (cat && b.category !== cat) return false
        if (query && !b.brand.toLowerCase().includes(query) && !b.model.toLowerCase().includes(query)) return false
        return true
      })

      if (filtered.length === 0) {
        grid.innerHTML = ''
        statusEl.style.display = 'block'
        return
      }
      statusEl.style.display = 'none'

      grid.innerHTML = filtered.map(b => {
        const price = b.priceLowest ? `<div class="catalog-card-price">a partir de R$ ${b.priceLowest.toLocaleString('pt-BR')}</div>` : ''
        const catName = (b.category || '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())
        const shiftIcon = b.shifting === 'electronic' || b.shifting === 'wireless' ? '⚡' : '🔧'
        return `<a href="${BASE}/bikes/${b.slug}/" class="catalog-card">
          <div class="catalog-card-brand">${b.brand}</div>
          <div class="catalog-card-model">${b.model}</div>
          <div class="catalog-card-specs">
            <span class="catalog-spec-tag">${b.frameMaterial === 'carbon' ? 'Carbono' : 'Alumínio'}</span>
            <span class="catalog-spec-tag">${b.groupset}</span>
            <span class="catalog-spec-tag">${b.speeds}v</span>
            <span class="catalog-spec-tag">${shiftIcon} ${b.shifting === 'electronic' ? 'Eletrônico' : b.shifting === 'wireless' ? 'Wireless' : 'Mecânico'}</span>
            ${b.weightKg ? `<span class="catalog-spec-tag">${b.weightKg} kg</span>` : ''}
          </div>
          ${price}
          <div class="catalog-card-category">${catName}</div>
        </a>`
      }).join('')
    }

    brandFilter.addEventListener('change', render)
    catFilter.addEventListener('change', render)
    searchInput.addEventListener('input', render)
    render()
  })
})()
</script>
