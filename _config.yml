title: "Pedal Data"
tagline: "Reviews, guias e dicas de ciclismo de estrada"
description: "Comparativos, reviews e guias de compra de bicicletas de estrada, componentes e acessórios para ciclistas brasileiros"
url: "https://marcuscapobiangomed-ai.github.io"
baseurl: "/pedaldata"
lang: pt-BR

author: "Equipe Pedal Data"
email: "seu-email@gmail.com"

markdown: kramdown
highlighter: rouge

permalink: /:year/:month/:title/

defaults:
  - scope:
      path: "_posts"
    values:
      layout: post

exclude:
  - bot
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - .gitignore

paginate: 10
paginate_path: "/page/:num/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
