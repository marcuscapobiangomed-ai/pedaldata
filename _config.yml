title: "Pedal Data"
tagline: "Reviews, guias e dicas de ciclismo de estrada"
description: "Comparativos, reviews e guias de compra de bicicletas de estrada, componentes e acessórios para ciclistas brasileiros"
url: "https://marcuscapobiangomed-ai.github.io"
baseurl: "/pedaldata"
lang: pt-BR

author: "Equipe Pedal Data"
email: "contato@pedaldatablog.com.br"

logo: "/assets/img/logo.svg"

social:
  name: Pedal Data
  links:
    - https://www.instagram.com/pedaldata
    # - https://www.youtube.com/@pedaldata  # adicionar quando criar canal

webmaster_verifications:
  google: googleae077bce8e335daa

google_analytics: G-DHD86P6XDZ

markdown: kramdown
highlighter: rouge

permalink: /:year/:month/:title/

# Metadados extras por post (usado no redesign)
# Adicionar nos posts: reading_time, image, image_alt, image_credit

defaults:
  - scope:
      path: "_posts"
    values:
      layout: post
      author: "Equipe Pedal Data"
  - scope:
      path: "_posts"
      type: posts
    values:
      image: /assets/img/logo.svg

exclude:
  - bot
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - .gitignore

paginate: 10
paginate_path: "/page/:num/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
